<script>
const SUPABASE_URL='https://bgxhsmrcagxgommwvntx.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJneGhzbXJjYWd4Z29tbXd2bnR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDM3OTcsImV4cCI6MjA5Nzk3OTc5N30.mh4K4R6PIsEfrH2XmmZ8fRcgIXh4Jw_Gd30Xyn2n23I';

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let data={drivers:[],customers:[],destinations:[],currentCheckout:null,log:[]};
let wizardState={step:0,driver:'',driverAvatar:null,stops:[],currentCustomer:null,override:false,overrideNote:''};
let currentView='status';

function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('nb-NO',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function nameColor(n){const c=['#ef4444','#f97316','#eab308','#22c55e','#14b8a6','#3b82f6','#6366f1','#a855f7','#ec4899','#06b6d4','#84cc16','#f43f5e'];let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return c[Math.abs(h)%c.length];}
function initials(n){const p=n.trim().split(/\s+/);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():n.slice(0,2).toUpperCase();}
function fmtAddr(st,zip,city){const p=[];if(st)p.push(st);if(zip&&city)p.push(zip+' '+city);else if(zip)p.push(zip);else if(city)p.push(city);return p.join(', ');}

// Avatar HTML helper
function avHtml(name,url,extra=''){
  if(url) return`<div class="av ${extra}"><img src="${esc(url)}" alt="${esc(name)}"></div>`;
  return`<div class="av ${extra}" style="background:${nameColor(name)}">${initials(name)}</div>`;
}

// --- IMAGE UPLOAD ---
function resizeImage(file,maxSize){
  return new Promise(resolve=>{
    const img=new Image();const reader=new FileReader();
    reader.onload=e=>{img.onload=()=>{
      const canvas=document.createElement('canvas');
      let w=img.width,h=img.height;
      if(w>h){if(w>maxSize){h*=maxSize/w;w=maxSize;}}else{if(h>maxSize){w*=maxSize/h;h=maxSize;}}
      canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(resolve,'image/jpeg',0.85);
    };img.src=e.target.result;};reader.readAsDataURL(file);
  });
}

async function uploadAvatar(file,folder,id){
  const blob=await resizeImage(file,400);
  const path=`${folder}/${id}_${Date.now()}.jpg`;
  const{error}=await sb.storage.from('avatars').upload(path,blob,{contentType:'image/jpeg',upsert:true});
  if(error){console.error(error);return null;}
  const{data:d}=sb.storage.from('avatars').getPublicUrl(path);
  return d.publicUrl;
}

let pendingUpload=null;
const fileInput=document.getElementById('file-input');
fileInput.addEventListener('change',async e=>{
  const file=e.target.files[0];if(!file||!pendingUpload)return;
  document.getElementById('uploading').classList.remove('hidden');
  try{
    const url=await uploadAvatar(file,pendingUpload.folder,pendingUpload.id);
    if(url){
      await sb.from(pendingUpload.table).update({avatar_url:url}).eq('id',pendingUpload.id);
      await fetchAll();
      if(currentView==='settings')renderSettings();
    }
  }catch(err){console.error(err);}
  document.getElementById('uploading').classList.add('hidden');
  fileInput.value='';pendingUpload=null;
});

function triggerUpload(table,folder,id){
  pendingUpload={table,folder,id};
  fileInput.click();
}

// --- ZIP LOOKUP ---
let zipTimeout=null;
async function lookupZip(zip){
  if(zip.length!==4||!/^\d{4}$/.test(zip))return null;
  try{const r=await fetch('https://api.bring.com/shippingguide/api/postalCode.json?clientUrl=nokkellogg&pnr='+zip);const d=await r.json();if(d.valid)return d.result;}catch(e){}return null;
}

// --- DATA ---
async function fetchAll(){
  try{
    const[drv,cust,dest,active,log]=await Promise.all([
      sb.from('drivers').select('id,name,avatar_url').order('name'),
      sb.from('customers').select('id,name,avatar_url').order('name'),
      sb.from('destinations').select('id,name,customer_id,street_address,zip_code,city').order('name'),
      sb.from('key_log').select('*,key_log_stops(customer_name,destination_name,street_address,zip_code,city,sort_order)').is('date_in',null).order('date_out',{ascending:false}).limit(1).maybeSingle(),
      sb.from('key_log').select('*,key_log_stops(customer_name,destination_name,street_address,zip_code,city,sort_order)').not('date_in','is',null).order('date_out',{ascending:false}).limit(200),
    ]);
    data.drivers=drv.data||[];
    data.customers=cust.data||[];
    data.destinations=dest.data||[];
    data.currentCheckout=active.data?{id:active.data.id,driver:active.data.driver,dateOut:active.data.date_out,
      stops:(active.data.key_log_stops||[]).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0))}:null;
    data.log=(log.data||[]).map(r=>({id:r.id,driver:r.driver,dateOut:r.date_out,dateIn:r.date_in,overrideNote:r.override_note,
      stops:(r.key_log_stops||[]).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0))}));
    return true;
  }catch(e){console.error(e);return false;}
}

function findDriver(name){return data.drivers.find(d=>d.name===name);}
function findCustomer(name){return data.customers.find(c=>c.name===name);}

async function dbAddDriver(n){await sb.from('drivers').upsert({name:n},{onConflict:'name'});}
async function dbRemoveDriver(id){await sb.from('drivers').delete().eq('id',id);}
async function dbAddCustomer(n){return await sb.from('customers').upsert({name:n},{onConflict:'name'}).select().single();}
async function dbRemoveCustomer(id){await sb.from('customers').delete().eq('id',id);}
async function dbAddDestination(name,cid,street,zip,city){await sb.from('destinations').insert({name,customer_id:cid,street_address:street||null,zip_code:zip||null,city:city||null});}
async function dbRemoveDestination(id){await sb.from('destinations').delete().eq('id',id);}
async function dbCheckout(driver,stops){
  const{data:row}=await sb.from('key_log').insert({driver,date_out:new Date().toISOString()}).select().single();
  if(row){await sb.from('key_log_stops').insert(stops.map((s,i)=>({log_id:row.id,customer_name:s.customer,destination_name:s.destination,street_address:s.street||null,zip_code:s.zip||null,city:s.city||null,sort_order:i})));}
}
async function dbReturn(id){await sb.from('key_log').update({date_in:new Date().toISOString()}).eq('id',id);}
async function dbOverrideReturn(id,note){await sb.from('key_log').update({date_in:new Date().toISOString(),override_note:note}).eq('id',id);}

// --- NAV ---
function showView(n){currentView=n;document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+n).classList.add('active');
  document.getElementById('nav-log').classList.toggle('active',n==='log');document.getElementById('nav-settings').classList.toggle('active',n==='settings');
  if(n==='status')renderStatus();if(n==='wizard')renderWizard();if(n==='log')renderLog();if(n==='settings')renderSettings();}
document.getElementById('nav-log').addEventListener('click',()=>showView(currentView==='log'?'status':'log'));
document.getElementById('nav-settings').addEventListener('click',()=>showView(currentView==='settings'?'status':'settings'));

// --- STATUS ---
function renderStatus(){
  const el=document.getElementById('view-status');const out=!!data.currentCheckout;const c=data.currentCheckout;
  const drvObj=out?findDriver(c.driver):null;
  el.innerHTML=`
    <div class="status-card ${out?'out':'available'}">
      <div class="status-icon">${out?'🔑':'🅿️'}</div>
      <div class="status-label">${out?'Nøkkel ute':'Nøkkel tilgjengelig'}</div>
      ${out?`<div class="status-details" style="display:flex;flex-direction:column;align-items:center">
        <div style="margin-bottom:12px">${avHtml(c.driver,drvObj?.avatar_url)}</div>
        <div style="text-align:center"><strong>${esc(c.driver)}</strong></div>
        <div style="text-align:left;width:100%;margin-top:12px">
        <div><strong>Hentet:</strong> ${fmtDate(c.dateOut)}</div>
        <div style="margin-top:8px"><strong>Stopp:</strong></div>
        ${c.stops.map((s,i)=>{const addr=fmtAddr(s.street_address,s.zip_code,s.city);const custObj=findCustomer(s.customer_name);
          return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0">${avHtml(s.customer_name,custObj?.avatar_url,'av-sm')}<div><strong>${i+1}.</strong> ${esc(s.customer_name)} → ${esc(s.destination_name)}${addr?`<br><span style="font-size:14px;color:#b45309">${esc(addr)}</span>`:''}</div></div>`;}).join('')}
        </div></div>`:''}
    </div>
    ${out?'<button class="btn-main btn-green" id="btn-return">✅ Lever tilbake nøkkel</button><div style="height:16px"></div><button class="btn-main btn-blue" id="btn-checkout-anyway" style="opacity:.8;font-size:18px">🔑 Hent nøkkel (overstyring)</button>'
        :'<button class="btn-main btn-blue" id="btn-start-checkout">🔑 Hent nøkkel</button>'}`;
  if(out){
    document.getElementById('btn-return').addEventListener('click',async()=>{await dbReturn(c.id);await fetchAll();renderStatus();});
    document.getElementById('btn-checkout-anyway').addEventListener('click',()=>{wizardState={step:1,driver:'',stops:[],currentCustomer:null,override:true,overrideNote:''};showView('wizard');});
  }else{document.getElementById('btn-start-checkout').addEventListener('click',()=>{wizardState={step:1,driver:'',stops:[],currentCustomer:null,override:false,overrideNote:''};showView('wizard');});}
}

// --- WIZARD ---
function renderWizard(){
  const el=document.getElementById('view-wizard');const s=wizardState;

  if(s.step===1){
    el.innerHTML=`<button class="wizard-back" id="wiz-back">← Tilbake</button><div class="wizard-step"><div class="wizard-title">Hvem er du?</div><div class="wizard-subtitle">Velg sjåfør</div><div class="card-grid" id="grid"></div></div>`;
    const g=document.getElementById('grid');
    data.drivers.forEach(d=>{g.innerHTML+=`<div class="card" data-name="${esc(d.name)}">${avHtml(d.name,d.avatar_url)}<div class="card-label">${esc(d.name)}</div></div>`;});
    g.querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>{s.driver=c.dataset.name;s.step=2;renderWizard();}));
    document.getElementById('wiz-back').addEventListener('click',()=>showView('status'));

  }else if(s.step===2){
    el.innerHTML=`<button class="wizard-back" id="wiz-back">← Tilbake</button><div class="wizard-step"><div class="wizard-title">Hvilken kunde?</div><div class="wizard-subtitle">${s.stops.length?'Legg til neste stopp':'Velg kunde'}</div><div class="card-grid" id="grid"></div></div>`;
    const g=document.getElementById('grid');
    data.customers.forEach(c=>{g.innerHTML+=`<div class="card" data-id="${c.id}" data-name="${esc(c.name)}">${avHtml(c.name,c.avatar_url)}<div class="card-label">${esc(c.name)}</div></div>`;});
    g.innerHTML+=`<div class="card card-add" id="add-new-cust"><div class="av" style="background:#e2e8f0;color:#94a3b8;font-size:36px">+</div><div class="card-label" style="color:#94a3b8">Ny kunde</div></div>`;
    g.querySelectorAll('.card:not(.card-add)').forEach(c=>c.addEventListener('click',()=>{s.currentCustomer={id:parseInt(c.dataset.id),name:c.dataset.name};s.step=3;renderWizard();}));
    document.getElementById('add-new-cust').addEventListener('click',()=>{showSimpleModal('Ny kunde','Kundenavn...',async val=>{await dbAddCustomer(val);await fetchAll();const cust=data.customers.find(c=>c.name===val);if(cust){s.currentCustomer=cust;s.step=3;renderWizard();}});});
    document.getElementById('wiz-back').addEventListener('click',()=>{if(s.stops.length){s.step=4;}else{s.step=1;}renderWizard();});

  }else if(s.step===3){
    const custDests=data.destinations.filter(d=>d.customer_id===s.currentCustomer.id);
    el.innerHTML=`<button class="wizard-back" id="wiz-back">← Tilbake</button><div class="wizard-step"><div class="wizard-title">Hvor skal du?</div><div class="wizard-subtitle">Destinasjoner for ${esc(s.currentCustomer.name)}</div><div class="card-grid" id="grid"></div></div>`;
    const g=document.getElementById('grid');
    custDests.forEach(d=>{const addr=fmtAddr(d.street_address,d.zip_code,d.city);
      g.innerHTML+=`<div class="card" data-name="${esc(d.name)}" data-street="${esc(d.street_address||'')}" data-zip="${esc(d.zip_code||'')}" data-city="${esc(d.city||'')}">${avHtml(d.name,null)}<div class="card-label">${esc(d.name)}</div>${addr?`<div class="card-addr">${esc(addr)}</div>`:''}</div>`;});
    g.innerHTML+=`<div class="card card-add" id="add-new-dest"><div class="av" style="background:#e2e8f0;color:#94a3b8;font-size:36px">+</div><div class="card-label" style="color:#94a3b8">Ny destinasjon</div></div>`;
    g.querySelectorAll('.card:not(.card-add)').forEach(c=>c.addEventListener('click',()=>{
      s.stops.push({customer:s.currentCustomer.name,destination:c.dataset.name,street:c.dataset.street,zip:c.dataset.zip,city:c.dataset.city});
      s.currentCustomer=null;s.step=4;renderWizard();}));
    document.getElementById('add-new-dest').addEventListener('click',()=>{showDestModal('Ny destinasjon – '+s.currentCustomer.name,async(name,street,zip,city)=>{
      await dbAddDestination(name,s.currentCustomer.id,street,zip,city);await fetchAll();
      s.stops.push({customer:s.currentCustomer.name,destination:name,street,zip,city});s.currentCustomer=null;s.step=4;renderWizard();});});
    document.getElementById('wiz-back').addEventListener('click',()=>{s.step=2;renderWizard();});

  }else if(s.step===4){
    const drvObj=findDriver(s.driver);
    let stopsHtml=s.stops.map((st,i)=>{const addr=fmtAddr(st.street,st.zip,st.city);const custObj=findCustomer(st.customer);
      return`<div class="stop-item"><div class="stop-number">${i+1}</div>${avHtml(st.customer,custObj?.avatar_url,'av-sm')}
        <div class="stop-info"><div class="stop-customer">${esc(st.customer)}</div><div class="stop-dest">→ ${esc(st.destination)}</div>${addr?`<div class="stop-addr">${esc(addr)}</div>`:''}</div>
        <button class="stop-remove" data-idx="${i}">×</button></div>`;}).join('');
    el.innerHTML=`<button class="wizard-back" id="wiz-back">← Tilbake</button><div class="wizard-step">
      <div class="wizard-title">${s.stops.length?'Bekreft tur':'Legg til stopp'}</div><div class="wizard-subtitle">${s.stops.length} stopp planlagt</div>
      ${s.override?'<div id="override-section"></div>':''}
      <div class="confirm-driver">${avHtml(s.driver,drvObj?.avatar_url,'av-sm')}<div><div class="confirm-driver-label">Sjåfør</div><div style="font-weight:700">${esc(s.driver)}</div></div></div>
      <div class="stop-list">${stopsHtml||'<div class="empty" style="padding:30px">Ingen stopp lagt til ennå.</div>'}</div>
      <div id="confirm-error"></div><div class="btn-row"><button class="btn-main btn-gray" id="btn-add-stop">➕ Legg til stopp</button></div>
      ${s.stops.length?'<button class="btn-main btn-blue" id="btn-confirm">✅ Bekreft – Hent nøkkel</button>':''}</div>`;
    if(s.override&&data.currentCheckout){document.getElementById('override-section').innerHTML=`<div class="override-banner"><strong>Overstyring</strong>Nøkkel er ute hos ${esc(data.currentCheckout.driver)}.<textarea class="override-note-input" id="inp-override-note" placeholder="Skriv begrunnelse...">${esc(s.overrideNote||'')}</textarea></div>`;
      document.getElementById('inp-override-note').addEventListener('input',e=>{s.overrideNote=e.target.value;});}
    document.querySelectorAll('.stop-remove').forEach(b=>b.addEventListener('click',()=>{s.stops.splice(parseInt(b.dataset.idx),1);renderWizard();}));
    document.getElementById('btn-add-stop').addEventListener('click',()=>{s.step=2;renderWizard();});
    const cb=document.getElementById('btn-confirm');
    if(cb)cb.addEventListener('click',async()=>{
      if(s.override){const note=(document.getElementById('inp-override-note')?.value||'').trim();if(!note){document.getElementById('confirm-error').innerHTML='<div class="error-box">Overstyring krever en merknad.</div>';return;}await dbOverrideReturn(data.currentCheckout.id,note);}
      await dbCheckout(s.driver,s.stops);await fetchAll();showView('status');});
    document.getElementById('wiz-back').addEventListener('click',()=>{s.step=1;renderWizard();});
  }
}

// --- MODALS ---
let modalCb=null;
function showSimpleModal(title,ph,cb){document.getElementById('modal').classList.remove('hidden');document.getElementById('modal-title').textContent=title;const inp=document.getElementById('modal-input');inp.placeholder=ph;inp.value='';inp.focus();modalCb=cb;}
document.getElementById('modal-cancel').addEventListener('click',()=>document.getElementById('modal').classList.add('hidden'));
document.getElementById('modal-ok').addEventListener('click',()=>{const v=document.getElementById('modal-input').value.trim();if(v&&modalCb)modalCb(v);document.getElementById('modal').classList.add('hidden');});
document.getElementById('modal-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('modal-ok').click();});

let destModalCb=null;
function showDestModal(title,cb){document.getElementById('dest-modal').classList.remove('hidden');document.getElementById('dest-modal-title').textContent=title;
  ['dm-name','dm-street','dm-zip','dm-city'].forEach(id=>document.getElementById(id).value='');document.getElementById('dm-zip-status').textContent='';document.getElementById('dm-name').focus();destModalCb=cb;}
document.getElementById('dm-cancel').addEventListener('click',()=>document.getElementById('dest-modal').classList.add('hidden'));
document.getElementById('dm-ok').addEventListener('click',()=>{const name=document.getElementById('dm-name').value.trim();if(!name)return;
  destModalCb?.(name,document.getElementById('dm-street').value.trim(),document.getElementById('dm-zip').value.trim(),document.getElementById('dm-city').value.trim());
  document.getElementById('dest-modal').classList.add('hidden');});
document.getElementById('dm-zip').addEventListener('input',function(){clearTimeout(zipTimeout);const v=this.value.trim();const st=document.getElementById('dm-zip-status');
  if(v.length<4){st.textContent='';document.getElementById('dm-city').value='';return;}
  if(v.length===4&&/^\d{4}$/.test(v)){st.textContent='Søker...';st.className='city-status city-loading';
    zipTimeout=setTimeout(async()=>{const city=await lookupZip(v);if(city){document.getElementById('dm-city').value=city;st.textContent='✓ '+city;st.className='city-status city-ok';}
    else{st.textContent='Ukjent postnummer';st.className='city-status city-err';}},300);}});

// --- LOG ---
function getFilteredLog(){const from=document.getElementById('export-from')?.value,to=document.getElementById('export-to')?.value;
  return data.log.filter(e=>{if(from){const d=new Date(from);d.setHours(0,0,0,0);if(new Date(e.dateOut)<d)return false;}if(to){const d=new Date(to);d.setHours(23,59,59,999);if(new Date(e.dateOut)>d)return false;}return true;});}
function renderLog(){const filtered=getFilteredLog();const from=document.getElementById('export-from')?.value,to=document.getElementById('export-to')?.value;
  document.getElementById('btn-export-reset').classList.toggle('hidden',!(from||to));document.getElementById('export-count').textContent=`${filtered.length} av ${data.log.length} oppføringer`;
  const list=document.getElementById('log-list');if(!data.log.length){list.innerHTML='<div class="empty">Ingen registreringer ennå.</div>';return;}
  list.innerHTML=data.log.map(e=>{const drvObj=findDriver(e.driver);return`
    <div class="log-entry"><div class="log-header"><div style="display:flex;align-items:center;gap:10px">${avHtml(e.driver,drvObj?.avatar_url,'av-xs')}<strong>${esc(e.driver)}</strong></div>${e.overrideNote?'<span class="override-badge">OVERSTYRT</span>':''}</div>
      <div><span class="log-label">Ut:</span> ${fmtDate(e.dateOut)}</div><div><span class="log-label">Inn:</span> ${fmtDate(e.dateIn)}</div>
      ${e.stops.map((s,i)=>{const addr=fmtAddr(s.street_address,s.zip_code,s.city);const custObj=findCustomer(s.customer_name);
        return`<div class="log-stop" style="display:flex;align-items:center;gap:8px">${avHtml(s.customer_name,custObj?.avatar_url,'av-xs')}<div><strong>${i+1}.</strong> ${esc(s.customer_name)} → ${esc(s.destination_name)}${addr?`<div class="log-stop-addr">${esc(addr)}</div>`:''}</div></div>`;}).join('')}
      ${e.overrideNote?`<div class="log-override-note">"${esc(e.overrideNote)}"</div>`:''}</div>`;}).join('');}
document.getElementById('export-from').addEventListener('change',renderLog);document.getElementById('export-to').addEventListener('change',renderLog);
document.getElementById('btn-export-reset').addEventListener('click',()=>{document.getElementById('export-from').value='';document.getElementById('export-to').value='';renderLog();});
document.getElementById('btn-export').addEventListener('click',()=>{const entries=getFilteredLog();if(!entries.length){alert('Ingen oppføringer.');return;}
  const from=document.getElementById('export-from').value,to=document.getElementById('export-to').value;const range=(from||to)?`${from||'start'} — ${to||'nå'}`:'Alle oppføringer';
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Nøkkellogg</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;padding:24px;color:#1e293b}h1{font-size:20px;margin-bottom:4px}.sub{font-size:13px;color:#64748b;margin-bottom:16px}table{width:100%;border-collapse:collapse;font-size:12px}th{background:#1e293b;color:#fff;text-align:left;padding:8px 10px}td{padding:7px 10px;border-bottom:1px solid #e2e8f0;vertical-align:top}tr:nth-child(even) td{background:#f8fafc}.addr{color:#64748b;font-size:11px}.ov{color:#92400e;font-style:italic;font-size:11px}.ft{margin-top:20px;font-size:11px;color:#94a3b8}@media print{body{padding:12px}}</style></head><body>
  <h1>EMP Secure — Nøkkellogg</h1><div class="sub">${range} | Eksportert ${fmtDate(new Date().toISOString())}</div>
  <table><thead><tr><th>Sjåfør</th><th>Stopp</th><th>Ut</th><th>Inn</th><th>Merknad</th></tr></thead><tbody>${entries.map(e=>{
    const stopsCol=e.stops.map((s,i)=>{const addr=fmtAddr(s.street_address,s.zip_code,s.city);return`${i+1}. ${esc(s.customer_name)} → ${esc(s.destination_name)}${addr?`<br><span class="addr">${esc(addr)}</span>`:''}`;}).join('<br>');
    return`<tr><td>${esc(e.driver)}</td><td>${stopsCol}</td><td>${fmtDate(e.dateOut)}</td><td>${fmtDate(e.dateIn)}</td><td>${e.overrideNote?`<span class="ov">${esc(e.overrideNote)}</span>`:'—'}</td></tr>`;}).join('')}</tbody></table>
  <div class="ft">${entries.length} oppføringer</div><script>window.onload=()=>window.print()<\/script></body></html>`;
  window.open(URL.createObjectURL(new Blob([html],{type:'text/html'})),'_blank');});

// --- SETTINGS ---
function renderSettings(){
  // Drivers
  const dl=document.getElementById('list-drivers');
  dl.innerHTML=data.drivers.map(d=>`<div class="settings-item">
    <div class="av av-sm" style="${d.avatar_url?'':`background:${nameColor(d.name)}`}" data-upload="driver" data-id="${d.id}">${d.avatar_url?`<img src="${esc(d.avatar_url)}">`:initials(d.name)}</div>
    <div class="settings-item-name">${esc(d.name)}</div>
    <button class="settings-item-rm" data-id="${d.id}">×</button></div>`).join('');
  dl.querySelectorAll('[data-upload="driver"]').forEach(el=>el.addEventListener('click',()=>triggerUpload('drivers','drivers',el.dataset.id)));
  dl.querySelectorAll('.settings-item-rm').forEach(b=>b.addEventListener('click',async()=>{await dbRemoveDriver(parseInt(b.dataset.id));await fetchAll();renderSettings();}));

  // Customers
  const cl=document.getElementById('list-customers');
  cl.innerHTML=data.customers.map(c=>`<div class="settings-item">
    <div class="av av-sm" style="${c.avatar_url?'':`background:${nameColor(c.name)}`}" data-upload="customer" data-id="${c.id}">${c.avatar_url?`<img src="${esc(c.avatar_url)}">`:initials(c.name)}</div>
    <div class="settings-item-name">${esc(c.name)}</div>
    <button class="settings-item-rm" data-id="${c.id}">×</button></div>`).join('');
  cl.querySelectorAll('[data-upload="customer"]').forEach(el=>el.addEventListener('click',()=>triggerUpload('customers','customers',el.dataset.id)));
  cl.querySelectorAll('.settings-item-rm').forEach(b=>b.addEventListener('click',async()=>{await dbRemoveCustomer(parseInt(b.dataset.id));await fetchAll();renderSettings();}));

  // Destinations
  const ds=document.getElementById('dest-settings');
  if(!data.customers.length){ds.innerHTML='<div class="empty" style="padding:20px">Legg til kunder først.</div>';return;}
  ds.innerHTML=data.customers.map(c=>{const dests=data.destinations.filter(d=>d.customer_id===c.id);
    return`<div class="dest-group"><div class="dest-group-title">${esc(c.name)}</div>
      <div style="margin-bottom:12px"><button class="btn-sm btn-blue dest-add-modal" data-cid="${c.id}" data-cname="${esc(c.name)}" style="width:100%">+ Legg til destinasjon</button></div>
      <div>${dests.map(d=>{const addr=fmtAddr(d.street_address,d.zip_code,d.city);
        return`<div class="dest-chip"><button class="dest-chip-rm" data-did="${d.id}">×</button><div class="dest-chip-name">${esc(d.name)}</div>${addr?`<div class="dest-chip-addr">${esc(addr)}</div>`:''}</div>`;}).join('')||'<span style="color:#94a3b8;font-size:16px">Ingen destinasjoner</span>'}</div></div>`;}).join('');
  ds.querySelectorAll('.dest-add-modal').forEach(b=>b.addEventListener('click',()=>{showDestModal('Ny destinasjon – '+b.dataset.cname,async(name,street,zip,city)=>{await dbAddDestination(name,parseInt(b.dataset.cid),street,zip,city);await fetchAll();renderSettings();});}));
  ds.querySelectorAll('.dest-chip-rm').forEach(b=>b.addEventListener('click',async()=>{await dbRemoveDestination(parseInt(b.dataset.did));await fetchAll();renderSettings();}));
}

async function settingsAddDriver(){const inp=document.getElementById('add-driver');const v=inp.value.trim();if(!v)return;await dbAddDriver(v);await fetchAll();renderSettings();inp.value='';}
async function settingsAddCustomer(){const inp=document.getElementById('add-customer');const v=inp.value.trim();if(!v)return;await dbAddCustomer(v);await fetchAll();renderSettings();inp.value='';}
document.getElementById('btn-add-driver').addEventListener('click',settingsAddDriver);
document.getElementById('btn-add-customer').addEventListener('click',settingsAddCustomer);
document.getElementById('add-driver').addEventListener('keydown',e=>{if(e.key==='Enter')settingsAddDriver();});
document.getElementById('add-customer').addEventListener('keydown',e=>{if(e.key==='Enter')settingsAddCustomer();});

// --- INIT ---
(async()=>{const ok=await fetchAll();if(ok)renderStatus();
  else document.getElementById('view-status').innerHTML=`<div class="conn-error"><h2>Kan ikke koble til database</h2><p>Sjekk Supabase-tilkoblingen.</p></div>`;})();
</script>
</body>
